<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG Deck Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1>MTG Deck Builder</h1>
      <select id="format-select">
        <option value="commander">Commander (100)</option>
        <option value="standard">Standard (60)</option>
        <option value="modern">Modern (60)</option>
        <option value="legacy">Legacy (60)</option>
        <option value="pauper">Pauper (60)</option>
      </select>
    </div>
    <div class="header-right">
      <input type="text" id="deck-name-input" placeholder="Deck name..." value="My Deck">
      <button class="btn btn-gold" id="save-btn">Save</button>
      <button class="btn" id="load-btn">Load</button>
      <button class="btn" id="export-btn">Export</button>
      <button class="btn" id="import-btn">Import</button>
      <button class="btn btn-collection" id="collection-btn">My Collection</button>
      <button class="btn btn-danger" id="clear-btn">Clear</button>
    </div>
  </header>

  <main class="app-main">

    <!-- Search Panel -->
    <section class="panel search-panel">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search for cards..." autocomplete="off">
        <button class="btn btn-gold" id="search-btn">Search</button>
      </div>
      <div class="search-filters">
        <select id="color-filter">
          <option value="">Any Color</option>
          <option value="W">White</option>
          <option value="U">Blue</option>
          <option value="B">Black</option>
          <option value="R">Red</option>
          <option value="G">Green</option>
          <option value="C">Colorless</option>
        </select>
        <select id="type-filter">
          <option value="">Any Type</option>
          <option value="creature">Creature</option>
          <option value="instant">Instant</option>
          <option value="sorcery">Sorcery</option>
          <option value="enchantment">Enchantment</option>
          <option value="artifact">Artifact</option>
          <option value="planeswalker">Planeswalker</option>
          <option value="land">Land</option>
        </select>
        <select id="sort-filter">
          <option value="name">Name</option>
          <option value="cmc">Mana Value</option>
          <option value="edhrec">EDHRec</option>
        </select>
      </div>
      <div id="search-results" class="card-grid"></div>
      <div class="pagination hidden" id="pagination">
        <button class="btn" id="prev-page">Prev</button>
        <span id="page-info">Page 1</span>
        <button class="btn" id="next-page">Next</button>
      </div>
    </section>

    <!-- Deck Panel -->
    <section class="panel deck-panel">
      <div class="deck-header">
        <h2>Deck</h2>
        <select id="deck-sort" title="Sort deck by">
          <option value="type">By Type</option>
          <option value="name">By Name</option>
          <option value="cmc">By Mana Value</option>
          <option value="price">By Price</option>
          <option value="rarity">By Rarity</option>
        </select>
        <span id="card-count" class="card-count">0 cards</span>
      </div>
      <div id="deck-list" class="deck-list"></div>
    </section>

    <!-- Stats + Suggestions Panel -->
    <section class="panel stats-panel">
      <div class="stats-section">
        <h3>Stats</h3>
        <div class="stat-row"><span>Total Cards</span><span id="stat-total">0</span></div>
        <div class="stat-row"><span>Avg Mana Value</span><span id="stat-avg-cmc">0.00</span></div>
        <div class="stat-row"><span>Est. Cost</span><span id="stat-cost" class="stat-cost">$0.00</span></div>
        <div class="stat-row"><span>Owned</span><span id="stat-owned">—</span></div>
        <div class="stat-row"><span>Format</span><span id="stat-illegal">—</span></div>
        <div class="stat-source">Prices via TCGPlayer (Scryfall)</div>
        <div class="stat-actions">
          <button class="btn btn-budget" id="budget-btn">Make it Cheaper</button>
          <button class="btn btn-tune" id="tune-btn">Tune Deck</button>
          <button class="btn btn-playtest" id="playtest-btn">Playtest</button>
          <button class="btn btn-buylist" id="buy-list-btn">Buy List</button>
        </div>
        <h4>Mana Curve</h4>
        <canvas id="mana-curve" width="280" height="140"></canvas>
        <h4>Colors</h4>
        <div id="color-dist" class="color-dist"></div>
        <h4>Card Types</h4>
        <div id="type-dist" class="type-dist"></div>
      </div>
      <div class="notes-section">
        <h4>Deck Notes</h4>
        <textarea id="deck-notes" class="deck-notes-area" placeholder="Strategy, combos, win conditions, sideboard notes..."></textarea>
      </div>

      <div class="suggestions-section">
        <h3>Suggestions</h3>
        <p class="hint">Top EDHRec-ranked cards matching your deck's colors</p>
        <button class="btn btn-gold" id="suggest-btn">Get Suggestions</button>
        <div id="suggestions-list" class="card-grid" style="margin-top:10px"></div>
      </div>
    </section>

  </main>

  <!-- Card Preview Tooltip -->
  <div id="card-preview" class="card-preview">
    <img id="preview-img" src="" alt="Card Preview">
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="modal-close">x</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
